name: Enable common interests removal

on:
  push:
    branches: [main]
    paths:
      - 'remove-common-interests.js'
      - '.github/workflows/enable-remove-common-interests.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Add cleanup script
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('index.html')
          text = path.read_text(encoding='utf-8')
          tag = '  <script src="remove-common-interests.js?v=remove-interests-20260715"></script>\n'
          if 'remove-common-interests.js' not in text:
              text = text.replace('</body>', tag + '</body>')
              path.write_text(text, encoding='utf-8')
          PY
      - name: Commit change
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Enable common interests removal on site"
          git push
