name: Enable hero and footer sunflowers
on:
  workflow_dispatch:
  push:
    paths:
      - 'hero-final-sunflowers.js'
jobs:
  update-index:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Add sunflower replacement script
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path('index.html')
          s = p.read_text(encoding='utf-8')
          tag = '  <script src="hero-final-sunflowers.js?v=hero-final-sunflowers-20260715"></script>\n'
          if 'hero-final-sunflowers.js' not in s:
              s = s.replace('</body>', tag + '</body>')
              p.write_text(s, encoding='utf-8')
          PY
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "Enable real sunflowers on hero and footer"
          git push
