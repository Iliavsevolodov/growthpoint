name: Enable expanded skills content

on:
  workflow_dispatch:
  push:
    paths:
      - 'skills-content-upgrade.js'

permissions:
  contents: write

jobs:
  update-index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Add skills script to index
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('index.html')
          text = path.read_text(encoding='utf-8')
          tag = '  <script src="skills-content-upgrade.js?v=skills-content-20260715"></script>\n'
          if 'skills-content-upgrade.js' not in text:
              text = text.replace('</body>', tag + '</body>')
              path.write_text(text, encoding='utf-8')
          PY
      - name: Commit update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "Enable expanded visual content skills"
          git push