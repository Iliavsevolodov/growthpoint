name: Enable modern hero typography fix
on:
  workflow_dispatch:
  push:
    paths:
      - 'hero-typography-modern-fix.js'
jobs:
  update-index:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Add modern typography script
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path('index.html')
          s = p.read_text(encoding='utf-8')
          tag = '  <script src="hero-typography-modern-fix.js?v=modern-type-20260715"></script>\n'
          if 'hero-typography-modern-fix.js' not in s:
              s = s.replace('</body>', tag + '</body>')
              p.write_text(s, encoding='utf-8')
          PY
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "Enable modern typography and hero spacing"
          git push