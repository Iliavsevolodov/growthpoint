name: Enable transformation slider cues

on:
  workflow_dispatch:
  push:
    paths:
      - 'slider-affordance.js'
      - '.github/workflows/enable-slider-affordance.yml'

permissions:
  contents: write

jobs:
  update-index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Add slider script
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path('index.html')
          text = p.read_text(encoding='utf-8')
          tag = '  <script src="slider-affordance.js?v=slider-affordance-20260715"></script>\n'
          if 'slider-affordance.js' not in text:
              text = text.replace('</body>', tag + '</body>')
              p.write_text(text, encoding='utf-8')
          PY
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "Enable transformation slider cues"
          git push